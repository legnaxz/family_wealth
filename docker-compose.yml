services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: wealth
      POSTGRES_USER: wealth
      POSTGRES_PASSWORD: wealth
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://wealth:wealth@postgres:5432/wealth
      REDIS_URL: redis://redis:6379/0
      APP_SECRET: change-me
      FRONTEND_ORIGIN: http://localhost:3000
      AUTH_DISABLED: "true"
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app

volumes:
  pg_data:
